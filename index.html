<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electrician Manager</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body onload="initApp()">

<header class="topbar">
<button onclick="toggleMenu()">☰</button>
<h1>Electrician App</h1>
<button onclick="goBack()">←</button>
</header>

<div id="sideMenu" class="side-menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('jobs')">Jobs</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('expenses')">Expenses</button>
<button onclick="showPage('invoices')">Invoices</button>
<button onclick="showPage('cashflow')">Cashflow</button>

<hr>

<button onclick="exportBackup()">Export Backup</button>
<input type="file" onchange="importBackup(event)">
</div>

<main>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
<h2>Dashboard</h2>

<div class="stats-grid">
<div class="card"><h3 id="income">0</h3><p>Income</p></div>
<div class="card"><h3 id="expense">0</h3><p>Expenses</p></div>
<div class="card"><h3 id="profit">0</h3><p>Profit</p></div>
<div class="card"><h3 id="unpaid">0</h3><p>Unpaid</p></div>
</div>
</section>

<!-- JOBS -->
<section id="jobs" class="page">
<h2>Jobs</h2>

<div class="card">
<select id="jobClient"></select>
<input id="jobType" placeholder="Type">
<input id="jobTotal" type="number" placeholder="Price">
<button onclick="saveJob()">Save Job</button>
</div>

<div id="jobsList"></div>
</section>

<!-- CLIENTS -->
<section id="clients" class="page">
<h2>Clients</h2>

<div class="card">
<input id="clientName" placeholder="Name">
<input id="clientPhone" placeholder="Phone">
<button onclick="saveClient()">Save</button>
</div>

<div id="clientsList"></div>
</section>

<!-- EXPENSES -->
<section id="expenses" class="page">
<h2>Expenses</h2>

<div class="card">
<input id="expenseCategory" placeholder="Category">
<input id="expenseAmount" type="number" placeholder="Amount">
<button onclick="saveExpense()">Add</button>
</div>

<div id="expensesList"></div>
</section>

<!-- INVOICES -->
<section id="invoices" class="page">
<h2>Invoices</h2>

<div class="card">
<select id="invoiceJob"></select>
<input id="tvaRate" type="number" placeholder="TVA %">
<button onclick="createInvoice()">Generate</button>
</div>

<div id="invoiceList"></div>
</section>

<!-- CASHFLOW -->
<section id="cashflow" class="page">
<h2>Cashflow</h2>

<div id="unpaidList"></div>
</section>

</main>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
