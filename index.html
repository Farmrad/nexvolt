<main id="app">

  <!-- DASHBOARD -->
  <section class="page active" id="dashboardPage">
    <h2>Dashboard</h2>

    <div class="card">
      <p>Nexvolt Mobile System ⚡</p>
    </div>

    <div class="grid">
      <button onclick="showPage('jobsPage')">Jobs</button>
      <button onclick="showPage('clientsPage')">Clients</button>
      <button onclick="showPage('financePage')">Finance</button>
    </div>
  </section>

  <!-- JOBS -->
  <section class="page" id="jobsPage">
    <h2>Jobs</h2>

    <div class="card">

      <input type="text" id="jobType" placeholder="Job type">

      <input type="number" id="jobTotal" placeholder="Total price">

      <button onclick="saveJob()">Save Job</button>

    </div>

    <div id="jobsList"></div>
  </section>

  <!-- CLIENTS -->
  <section class="page" id="clientsPage">
    <h2>Clients</h2>

    <div class="card">

      <input type="text" id="clientName" placeholder="Client name">

      <input type="text" id="clientPhone" placeholder="Phone number">

      <button onclick="saveClient()">Save Client</button>

    </div>

    <div id="clientsList"></div>
  </section>

  <!-- FINANCE -->
  <section class="page" id="financePage">
    <h2>Finance</h2>

    <div class="card">
      <p>Finance system coming next</p>
    </div>
  </section>

</main>
