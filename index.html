<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nexvolt</title>

  <link rel="stylesheet" href="style.css">
</head>

<body onload="initApp()">

  <!-- HEADER -->
  <header class="topbar">
    <h1>Nexvolt ⚡</h1>
  </header>

  <!-- APP -->
  <main id="app">

    <!-- DASHBOARD -->
    <section class="page active" id="dashboardPage">

      <h2>Dashboard</h2>

      <div class="card">
        <p>Nexvolt Electrician System</p>
      </div>

      <div class="grid">

        <button onclick="showPage('jobsPage')">
          Jobs
        </button>

        <button onclick="showPage('clientsPage')">
          Clients
        </button>

        <button onclick="showPage('financePage')">
          Finance
        </button>

      </div>

    </section>

    <!-- JOBS PAGE -->
    <section class="page" id="jobsPage">

      <h2>Jobs</h2>

      <div class="card">

        <!-- CLIENT SELECT -->
        <select id="jobClient">
          <option value="">Select Client</option>
        </select>

        <!-- JOB TYPE -->
        <input
          type="text"
          id="jobType"
          placeholder="Job type"
        >

        <!-- TOTAL -->
        <input
          type="number"
          id="jobTotal"
          placeholder="Total price"
        >

        <!-- STATUS -->
        <select id="jobStatus">
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending Payment</option>
        </select>

        <button onclick="saveJob()">
          Save Job
        </button>

      </div>

      <div id="jobsList"></div>

    </section>

    <!-- CLIENTS PAGE -->
    <section class="page" id="clientsPage">

      <h2>Clients</h2>

      <div class="card">

        <input
          type="text"
          id="clientName"
          placeholder="Client name"
        >

        <input
          type="text"
          id="clientPhone"
          placeholder="Phone number"
        >

        <button onclick="saveClient()">
          Save Client
        </button>

      </div>

      <div id="clientsList"></div>

    </section>

    <!-- FINANCE PAGE -->
    <section class="page" id="financePage">

      <h2>Finance</h2>

      <div class="card">
        <p>Finance system coming next</p>
      </div>

    </section>

  </main>

  <script src="db/db.js"></script>
  <script src="app.js"></script>

</body>

</html>
