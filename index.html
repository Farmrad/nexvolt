<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electrician OS Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="initApp()">

<!-- FLOATING MENU (FIX FOR MOBILE) -->
<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sideMenu" class="side">

<h3>⚡ Nexvolt</h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('jobs')">Jobs</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('expenses')">Expenses</button>
<button onclick="showPage('invoices')">Invoices</button>
<button onclick="showPage('settings')">Settings</button>

</div>

<main>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">

<h1>Dashboard</h1>

<div class="grid">

<div class="card"><h3>Income</h3><p id="income">0</p></div>
<div class="card"><h3>Expenses</h3><p id="expense">0</p></div>
<div class="card"><h3>Profit</h3><p id="profit">0</p></div>

</div>

<!-- CHARTS -->
<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

</section>

<!-- JOBS -->
<section id="jobs" class="page">

<h2>Jobs</h2>

<div class="card form">

<select id="jobClient"></select>
<input id="jobType" placeholder="Job type">
<input id="jobTotal" type="number" placeholder="Price">

<button onclick="saveJob()">Save Job</button>

</div>

<div id="jobsList"></div>

</section>

<!-- SETTINGS -->
<section id="settings" class="page">

<h2>Settings</h2>

<div class="card">

<h3>Theme</h3>
<button onclick="setTheme('dark')">Dark Mode</button>
<button onclick="setTheme('light')">Light Mode</button>

</div>

<div class="card">

<h3>Language</h3>
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('ar')">Arabic</button>

</div>

</section>

</main>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
