<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexvolt</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initApp()">

  <!-- HEADER -->
  <header class="topbar">
    <h1>Nexvolt ⚡</h1>
  </header>

  <!-- MAIN CONTENT -->
  <main id="app">

    <!-- DASHBOARD -->
    <section class="page active" id="dashboardPage">
      <h2>Dashboard</h2>

      <div class="card">
        <p>Welcome to Nexvolt System</p>
      </div>

      <div class="grid">
        <button onclick="showPage('jobsPage')">Jobs</button>
        <button onclick="showPage('clientsPage')">Clients</button>
        <button onclick="showPage('financePage')">Finance</button>
      </div>
    </section>

    <!-- JOBS -->
    <section class="page" id="jobsPage">
      <h2>Jobs</h2>

      <button onclick="openJobForm()">+ New Job</button>

      <div id="jobsList"></div>
    </section>

    <!-- CLIENTS -->
    <section class="page" id="clientsPage">
      <h2>Clients</h2>

      <button onclick="openClientForm()">+ New Client</button>

      <div id="clientsList"></div>
    </section>

    <!-- FINANCE -->
    <section class="page" id="financePage">
      <h2>Finance</h2>

      <div class="card">
        <p>Income / Expenses / Profit coming next</p>
      </div>
    </section>

  </main>

  <script src="db/db.js"></script>
  <script src="app.js"></script>

</body>
</html>
